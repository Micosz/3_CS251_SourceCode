<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>รายละเอียดสายพันธุ์ — Admin</title>
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body class="admin-body">

  <main class="admin-main">
    <header class="admin-header">
      <div style="display:flex; align-items:center; gap:2rem;">
        <a href="zone-detail.html?id=1" style="text-decoration:none; color:var(--admin-text); font-size:1.5rem;">❮</a>
        <h1 class="admin-title" id="species-title">ฮิปโปโปเตมัส #11</h1>
      </div>
    </header>

    <div class="admin-card">
      <table class="admin-table">
        <thead>
          <tr>
            <th>หมายเลขสัตว์</th>
            <th>ชื่อ</th>
            <th>เพศ</th>
            <th>วันเกิด</th>
            <th>หมายเลขกรง</th>
            <th style="text-align:right;">การจัดการ</th>
          </tr>
        </thead>
        <tbody id="animal-list">
          <!-- Injected by JS -->
        </tbody>
      </table>
    </div>
  </main>

  <script src="../js/mockData.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/admin.js"></script>
  <script>
    initAdminLayout('animals');

    const urlParams = new URLSearchParams(window.location.search);
    const sid = urlParams.get('id');
    const sName = sid === '11' ? 'ฮิปโปโปเตมัส' : sid === '12' ? 'คาปิบาร่า' : 'เพนกวิน';
    document.getElementById('species-title').textContent = `${sName} #${sid || '11'}`;

    const mockAnimals = [
      { id: '#1-1', name: 'น้องหมูมะนาว', gender: 'ตัวผู้', dob: 'Feb 11, 2026', cageId: '#1' },
      { id: '#1-2', name: 'น้องหมูกรอบ', gender: 'ตัวเมีย', dob: 'Feb 1, 2026', cageId: '#1' }
    ];

    document.getElementById('animal-list').innerHTML = mockAnimals.map(a => `
      <tr>
        <td>${a.id}</td>
        <td>${a.name}</td>
        <td>${a.gender}</td>
        <td>${a.dob}</td>
        <td>${a.cageId}</td>
        <td style="text-align:right;">
          <a href="animal-detail.html?id=${a.id.replace('#','')}" class="btn-edit" style="text-decoration:none; display:inline-flex;">เพิ่มเติม</a>
        </td>
      </tr>
    `).join('');
  </script>
</body>
</html>
