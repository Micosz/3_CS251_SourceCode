<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เพิ่มข้อมูลสัตว์ — Admin</title>
  <link rel="stylesheet" href="../css/admin.css">
</head>

<body class="admin-body">

  <main class="admin-main">
    <header class="admin-header" style="display:flex; align-items:center; gap:1.5rem;">
      <a href="#" id="back-btn" style="text-decoration:none; font-size:1.8rem; color:var(--admin-text);">❮</a>
      <h1 class="admin-title">เพิ่มข้อมูลสัตว์</h1>
    </header>

    <div class="admin-form-container">
      <form id="add-animal-form">
        <div class="form-grid">
          <div class="admin-form-group">
            <label class="label-required">หมายเลขโซน</label>
            <input type="text" class="admin-form-control" name="zoneId" id="zoneId" readonly
              style="background:#e2e8f0; cursor:not-allowed;">
          </div>
          <div class="admin-form-group">
            <label class="label-required">หมายเลขกรง</label>
            <input type="text" class="admin-form-control" name="cageId" id="cageId" readonly
              style="background:#e2e8f0; cursor:not-allowed;">
          </div>
          <div class="admin-form-group">
            <label class="label-required">หมายเลขสายพันธุ์</label>
            <input type="text" class="admin-form-control" name="speciesId" id="speciesId" readonly
              style="background:#e2e8f0; cursor:not-allowed;">
          </div>
        </div>

        <div class="form-grid">
          <div class="admin-form-group">
            <label class="label-required">ชื่อ</label>
            <input type="text" class="admin-form-control" name="name" placeholder="พิมพ์ชื่อ" required>
          </div>
          <div class="admin-form-group">
            <label class="label-required">เพศ</label>
            <select class="admin-form-control" name="gender" required>
              <option value="Male">ตัวผู้ (Male)</option>
              <option value="Female">ตัวเมีย (Female)</option>
            </select>
          </div>
          <div class="admin-form-group">
            <label class="label-required">วันเกิด</label>
            <input type="date" class="admin-form-control" name="birthDate" required>
          </div>
        </div>

        <div class="form-grid">
          <div class="admin-form-group">
            <label>วันที่เข้า</label>
            <input type="date" class="admin-form-control" name="entryDate">
          </div>
          <div class="admin-form-group">
            <label>หมายเลขพ่อพันธุ์</label>
            <input type="number" class="admin-form-control" name="fatherId" placeholder="ระบุ AnimalID พ่อ (ถ้ามี)">
          </div>
          <div class="admin-form-group">
            <label>หมายเลขแม่พันธุ์</label>
            <input type="number" class="admin-form-control" name="motherId" placeholder="ระบุ AnimalID แม่ (ถ้ามี)">
          </div>
        </div>

        <div style="display:flex; justify-content:flex-end; margin-top:2rem;">
          <button type="submit" class="btn-confirm" id="submit-btn">บันทึกข้อมูล</button>
        </div>
      </form>
    </div>
  </main>

  <script src="../js/auth.js"></script>
  <script src="../js/admin.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initAdminLayout('animals');

      // อ่านค่าจาก URL มาแปะล็อคไว้
      const params = new URLSearchParams(window.location.search);
      const sid = params.get('speciesId') || '';
      const cid = params.get('cageId') || '';
      const zid = params.get('zoneId') || '';

      document.getElementById('zoneId').value = zid;
      document.getElementById('cageId').value = cid;
      document.getElementById('speciesId').value = sid;

      // ทำปุ่มย้อนกลับให้กลับไปถูกกรง
      const backUrl = sid && cid ? `species-detail.html?speciesId=${sid}&cageId=${cid}&zoneId=${zid}` : 'zones.html';
      document.getElementById('back-btn').href = backUrl;

      document.getElementById('add-animal-form').addEventListener('submit', async function (e) {
        e.preventDefault();

        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.textContent = 'กำลังบันทึก...';

        const formData = new FormData(this);
        const data = Object.fromEntries(formData.entries());

        try {
          const res = await fetch('/api/animals', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
          });
          const result = await res.json();

          if (result.success) {
            alert(result.message);
            window.location.href = backUrl;
          } else {
            alert('เกิดข้อผิดพลาด: ' + result.message);
            btn.disabled = false;
            btn.textContent = 'บันทึกข้อมูล';
          }
        } catch (err) {
          console.error(err);
          alert('ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้');
          btn.disabled = false;
          btn.textContent = 'บันทึกข้อมูล';
        }
      });
    });
  </script>
</body>

</html>
