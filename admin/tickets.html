<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>จัดการระบบตั๋ว — Admin</title>
  <link rel="stylesheet" href="../css/admin.css">
  <style>
    /* Inline editing style */
    .edit-mode .display-val {
      display: none;
    }

    .display-mode .edit-ctrls {
      display: none;
    }

    .edit-ctrls {
      display: flex;
      align-items: center;
      gap: 1.25rem;
    }

    .qty-display {
      font-weight: 500;
      min-width: 20px;
      text-align: center;
    }
  </style>
</head>

<body class="admin-body">

  <main class="admin-main">
    <header class="admin-header">
      <h1 class="admin-title">จัดการระบบตั๋ว</h1>
    </header>

    <div class="admin-card">
      <table class="admin-table">
        <thead>
          <tr>
            <th>VisitorID</th>
            <th>TicketID</th>
            <th>ประเภทตั๋ว</th>
            <th>Promocode</th>
            <th>วันที่เข้าชม</th>
            <th style="text-align:right;">การจัดการ</th>
          </tr>
        </thead>
        <tbody id="ticketTableBody">
          <tr>
            <td colspan="6" style="text-align:center; padding:2rem;">กำลังโหลดข้อมูล...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>

  <script src="../js/auth.js"></script>
  <script src="../js/admin.js"></script>
  <script>
    initAdminLayout('tickets');

    let ticketsData = [];

    document.addEventListener('DOMContentLoaded', fetchTickets);

    async function fetchTickets() {
      try {
        const res = await fetch('/api/tickets');
        const result = await res.json();
        if (result.success) {
          ticketsData = result.data;
          renderTickets();
        }
      } catch (err) {
        console.error(err);
        document.getElementById('ticketTableBody').innerHTML = '<tr><td colspan="6" style="text-align:center;">โหลดข้อมูลไม่สำเร็จ</td></tr>';
      }
    }

    function renderTickets() {
      const tbody = document.getElementById('ticketTableBody');
      if (ticketsData.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">ไม่มีข้อมูลตั๋วในระบบ</td></tr>';
        return;
      }

      let html = '';
      let lastVisitorId = null;

      ticketsData.forEach((t, idx) => {
        // Add a group header if VisitorID changes
        if (t.VisitorID !== lastVisitorId) {
            html += `
                <tr style="background: #f1f5f9; border-top: 2px solid #cbd5e0;">
                    <td colspan="6" style="padding: 0.5rem 1.5rem; font-weight: bold; color: #475569; font-size: 0.85rem;">
                        👤 ผู้เข้าชม: ${t.VisitorFName ? t.VisitorFName + ' ' + t.VisitorLName : 'Visitor #' + t.VisitorID}
                    </td>
                </tr>
            `;
            lastVisitorId = t.VisitorID;
        }

        html += `
            <tr>
              <td>#${t.VisitorID || '-'}</td>
              <td style="font-weight:bold;">#${t.TicketID}</td>
              <td><span style="color:#2d6a4f; font-weight:bold;">${t.TicketType}</span></td>
              <td>${t.PromotionCode || '-'}</td>
              <td>${t.VisitDate}</td>
              <td style="text-align:right;">
                <div class="action-btns">
                  <button class="btn-edit" onclick="duplicateTicket(${idx})" title="เพิ่มตั๋วใบใหม่สำหรับ User นี้">เพิ่ม +</button>
                  <button class="btn-cancel" onclick="deleteTicket(${t.TicketID})" title="ลบตั๋วใบนี้">ลบ 🗑️</button>
                </div>
              </td>
            </tr>
        `;
      });

      tbody.innerHTML = html;
    }

    async function duplicateTicket(idx) {
        const ticket = ticketsData[idx];
        if (confirm(`ต้องการเพิ่มตั๋วประเภท ${ticket.TicketType} ให้กับ Visitor #${ticket.VisitorID} อีก 1 ใบ ใช่หรือไม่?`)) {
            try {
                const res = await fetch('/api/tickets', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        visitorId: ticket.VisitorID,
                        promotionId: ticket.PromotionID,
                        ticketType: ticket.TicketType,
                        visitDate: ticket.VisitDate,
                        price: ticket.Price
                    })
                });
                const result = await res.json();
                if (result.success) {
                    alert('เพิ่มตั๋วใบใหม่เรียบร้อย');
                    fetchTickets();
                } else {
                    alert('Error: ' + result.message);
                }
            } catch (err) {
                alert('เกิดข้อผิดพลาดในการสร้างตั๋วเพิ่ม');
            }
        }
    }

    async function deleteTicket(ticketId) {
        if (confirm('ยืนยันการลบตั๋วใบนี้ใช่หรือไม่?')) {
            try {
                const res = await fetch(`/api/tickets/${ticketId}`, { method: 'DELETE' });
                const result = await res.json();
                if (result.success) {
                    alert('ลบตั๋วเรียบร้อย');
                    fetchTickets();
                }
            } catch (err) {
                alert('เกิดข้อผิดพลาดในการลบ');
            }
        }
    }
  </script>
</body>

</html>
