<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>จัดการระบบตั๋ว — Admin</title>
  <link rel="stylesheet" href="../css/admin.css">
  <style>
    /* Inline editing style */
    .edit-mode .display-val {
      display: none;
    }

    .display-mode .edit-ctrls {
      display: none;
    }

    .edit-ctrls {
      display: flex;
      align-items: center;
      gap: 1.25rem;
    }

    .qty-display {
      font-weight: 500;
      min-width: 20px;
      text-align: center;
    }
  </style>
</head>

<body class="admin-body">

  <main class="admin-main">
    <header class="admin-header">
      <h1 class="admin-title">จัดการระบบตั๋ว</h1>
    </header>

    <div class="admin-card">
      <table class="admin-table">
        <thead>
          <tr>
            <th>UserID</th>
            <th>TicketID</th>
            <th>สถานะ</th>
            <th>Promocode</th>
            <th>จำนวน</th>
            <th style="text-align:right;">การจัดการ</th>
          </tr>
        </thead>
        <tbody id="ticketTableBody">
          <tr>
            <td colspan="6" style="text-align:center; padding:2rem;">กำลังโหลดข้อมูล...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>

  <script src="../js/auth.js"></script>
  <script src="../js/admin.js"></script>
  <script>
    initAdminLayout('tickets');

    let ticketsData = [];

    document.addEventListener('DOMContentLoaded', fetchTickets);

    async function fetchTickets() {
      try {
        const res = await fetch('/api/tickets');
        const result = await res.json();
        if (result.success) {
          // 1 แถวใน DB เท่ากับตั๋ว 1 ใบ
          ticketsData = result.data.map(t => ({ ...t, displayQty: 1 }));
          renderTickets();
        }
      } catch (err) {
        console.error(err);
        document.getElementById('ticketTableBody').innerHTML = '<tr><td colspan="6" style="text-align:center;">โหลดข้อมูลไม่สำเร็จ</td></tr>';
      }
    }

    function renderTickets() {
      const tbody = document.getElementById('ticketTableBody');
      if (ticketsData.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">ไม่มีข้อมูลตั๋วในระบบ</td></tr>';
        return;
      }

      tbody.innerHTML = ticketsData.map((t, idx) => `
        <tr id="row-${idx}" class="display-mode">
          <td>#${t.VisitorID || '-'}</td>
          <td style="font-weight:bold;">#${t.TicketID}</td>
          <td><span style="color:#2d6a4f; font-weight:bold;">${t.TicketType}</span></td>
          <td>${t.PromotionCode || '-'}</td>
          <td>
            <span class="display-val">${t.displayQty}</span>
            <div class="edit-ctrls">
                <button class="qty-btn" onclick="updateLocalQty(${idx}, -1)">−</button>
                <span class="qty-display" id="qty-${idx}">${t.displayQty}</span>
                <button class="qty-btn" disabled>+</button> <!-- ล็อกไว้เพราะสร้างเพิ่มไม่ได้ -->
            </div>
          </td>
          <td style="text-align:right;">
            <div class="action-btns display-val">
              <button class="btn-edit" onclick="enterEditMode(${idx})">แก้ไข 📝</button>
            </div>
            <div class="action-btns edit-ctrls">
              <button class="btn-confirm" onclick="saveEdit(${idx})">ยืนยัน</button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    function enterEditMode(idx) {
      document.getElementById(`row-${idx}`).className = 'edit-mode';
    }

    function updateLocalQty(idx, delta) {
      // ปรับลดได้อย่างเดียว เพิ่มไม่ได้ตามเงื่อนไข
      ticketsData[idx].displayQty = Math.max(0, ticketsData[idx].displayQty + delta);
      document.getElementById(`qty-${idx}`).textContent = ticketsData[idx].displayQty;
    }

    async function saveEdit(idx) {
      const ticket = ticketsData[idx];
      if (ticket.displayQty === 0) {
        if (confirm('จำนวนเหลือ 0 ยืนยันการยกเลิกตั๋วนี้ใช่หรือไม่?')) {
          try {
            const res = await fetch(`/api/tickets/${ticket.TicketID}`, { method: 'DELETE' });
            const result = await res.json();
            if (result.success) {
              alert('ยกเลิกตั๋วเรียบร้อย');
              fetchTickets(); // โหลดข้อมูลใหม่
            }
          } catch (err) {
            alert('เกิดข้อผิดพลาดในการยกเลิก');
          }
        } else {
          ticket.displayQty = 1; // ยกเลิกการแก้ไข ให้กลับเป็น 1 เหมือนเดิม
          renderTickets();
        }
      } else {
        document.getElementById(`row-${idx}`).className = 'display-mode';
      }
    }
  </script>
</body>

</html>
