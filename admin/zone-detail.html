<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>รายละเอียดโซน — Admin</title>
  <link rel="stylesheet" href="../css/admin.css">
</head>

<body class="admin-body">

  <main class="admin-main">
    <header class="admin-header">
      <div style="display:flex; align-items:center; gap:2rem;">
        <a href="zones.html" style="text-decoration:none; color:var(--admin-text); font-size:1.5rem;">❮</a>
        <h1 class="admin-title" id="zone-title">ZONE 1</h1>
      </div>
    </header>

    <div class="admin-card">
      <table class="admin-table">
        <thead>
          <tr>
            <th>หมายเลขกรง</th>
            <th>หมายเลขสายพันธุ์</th>
            <th>ชื่อสายพันธุ์</th>
            <th>จำนวน</th>
            <th style="text-align:right;">การจัดการ</th>
          </tr>
        </thead>
        <tbody id="species-list">
          <tr>
            <td colspan="5" style="text-align:center; padding:2rem;">กำลังโหลดข้อมูล...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>

  <script src="../js/auth.js"></script>
  <script src="../js/admin.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initAdminLayout('animals');

      const urlParams = new URLSearchParams(window.location.search);
      const zid = urlParams.get('id') || '1';
      document.getElementById('zone-title').textContent = `ZONE ${zid}`;

      fetchSpeciesInZone(zid);
    });

    async function fetchSpeciesInZone(zoneId) {
      try {
        const res = await fetch(`/api/zones/${zoneId}/species`);
        const result = await res.json();

        const tbody = document.getElementById('species-list');
        if (result.success && result.data.length > 0) {
          tbody.innerHTML = result.data.map(s => `
            <tr>
              <td>กรงที่ ${s.EnclosureID}</td>
              <td>#${s.SpeciesID}</td>
              <td style="font-weight:bold;">${s.SpeciesName}</td>
              <td>${s.AnimalCount} ตัว</td>
              <td style="text-align:right;">
                <a href="species-detail.html?speciesId=${s.SpeciesID}&cageId=${s.EnclosureID}&zoneId=${zoneId}" class="btn-edit" style="text-decoration:none; display:inline-flex;">จัดการข้อมูลสัตว์</a>
              </td>
            </tr>
          `).join('');
        } else {
          tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">ไม่พบข้อมูลสัตว์ในโซนนี้</td></tr>';
        }
      } catch (err) {
        console.error(err);
        document.getElementById('species-list').innerHTML = '<tr><td colspan="5" style="text-align:center;">ข้อผิดพลาดในการโหลดข้อมูล</td></tr>';
      }
    }
  </script>
</body>

</html>
