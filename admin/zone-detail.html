<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>รายละเอียดโซน — Admin</title>
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body class="admin-body">

  <main class="admin-main">
    <header class="admin-header">
      <div style="display:flex; align-items:center; gap:2rem;">
        <a href="zones.html" style="text-decoration:none; color:var(--admin-text); font-size:1.5rem;">❮</a>
        <h1 class="admin-title" id="zone-title">ZONE 1</h1>
      </div>
    </header>

    <div class="admin-card">
      <table class="admin-table">
        <thead>
          <tr>
            <th>หมายเลขกรง</th>
            <th>หมายเลขสายพันธุ์</th>
            <th>ชื่อสายพันธุ์</th>
            <th>จำนวน</th>
            <th style="text-align:right;">การจัดการ</th>
          </tr>
        </thead>
        <tbody id="species-list">
          <!-- Injected by JS -->
        </tbody>
      </table>
    </div>
  </main>

  <script src="../js/mockData.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/admin.js"></script>
  <script>
    initAdminLayout('animals');

    const urlParams = new URLSearchParams(window.location.search);
    const zid = urlParams.get('id');
    document.getElementById('zone-title').textContent = `ZONE ${zid || '1'}`;

    const mockSpecies = [
      { cage: '#1', speciesId: '#11', name: 'ฮิปโปโปเตมัส', count: 10 },
      { cage: '#2', speciesId: '#12', name: 'คาปิบาร่า', count: 15 },
      { cage: '#3', speciesId: '#13', name: 'เพนกวิน', count: 20 }
    ];

    document.getElementById('species-list').innerHTML = mockSpecies.map(s => `
      <tr>
        <td>${s.cage}</td>
        <td>${s.speciesId}</td>
        <td>${s.name}</td>
        <td>${s.count}</td>
        <td style="text-align:right;">
          <a href="species-detail.html?id=${s.speciesId.replace('#','')}" class="btn-edit" style="text-decoration:none; display:inline-flex;">เพิ่มเติม</a>
        </td>
      </tr>
    `).join('');
  </script>
</body>
</html>
