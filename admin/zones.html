<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>จัดการข้อมูลสัตว์ — Admin</title>
  <link rel="stylesheet" href="../css/admin.css">
</head>

<body class="admin-body">

  <main class="admin-main">
    <header class="admin-header" style="display:flex; justify-content:space-between; align-items:center;">
      <h1 class="admin-title">จัดการโซน (Zones)</h1>
    </header>

    <div class="admin-card">
      <table class="admin-table">
        <thead>
          <tr>
            <th>หมายเลขโซน</th>
            <th>ชื่อโซน</th>
            <th>คำอธิบาย</th>
            <th style="text-align:right;">การจัดการ</th>
          </tr>
        </thead>
        <tbody id="zoneTableBody">
          <tr>
            <td colspan="6" style="text-align:center; padding:2rem;">กำลังโหลดข้อมูล...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>

  <script src="../js/auth.js"></script>
  <script src="../js/admin.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initAdminLayout('animals'); // ใช้ tab เดิม
      fetchZones();
    });

    async function fetchZones() {
      try {
        const res = await fetch('/api/zones');
        const result = await res.json();
        if (result.success) {
          const tbody = document.getElementById('zoneTableBody');
          tbody.innerHTML = result.data.map(z => `
            <tr>
              <td>ZONE ${z.ZoneID}</td>
              <td style="font-weight:bold; color:var(--primary-dark);">${z.ZoneName}</td>
              <td style="color:#666; font-size:0.9rem;">${z.ZoneDescrip || '-'}</td>
              <td style="text-align:right;">
                <a href="zone-detail.html?id=${z.ZoneID}" class="btn-confirm" style="text-decoration:none; background:#C1E1C1; color:#1a2e1a;">ดูรายละเอียดสายพันธุ์</a>
              </td>
            </tr>
          `).join('');
        }
      } catch (err) {
        console.error(err);
        document.getElementById('zoneTableBody').innerHTML = '<tr><td colspan="6" style="text-align:center;">ไม่สามารถโหลดข้อมูลได้</td></tr>';
      }
    }
  </script>
</body>

</html>
