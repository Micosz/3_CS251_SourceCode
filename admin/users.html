<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>จัดการผู้ใช้งาน - Admin</title>
  <link rel="stylesheet" href="../css/admin.css">
  <style>
    .search-bar {
      display: flex;
      gap: 0.5rem;
    }

    .btn-action {
      padding: 0.4rem 0.8rem;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: bold;
    }

    .btn-promote {
      background: #f59e0b;
      color: white;
    }

    .btn-demote {
      background: #ef4444;
      color: white;
    }

    .role-badge {
      padding: 0.3rem 0.6rem;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: bold;
    }

    .role-admin {
      background: #d1fae5;
      color: #065f46;
    }

    .role-user {
      background: #e0e7ff;
      color: #3730a3;
    }
  </style>
</head>

<body class="admin-body">
  <main class="admin-main">
    <header class="admin-header" style="display:flex; justify-content:space-between; align-items:center;">
      <h1 class="admin-title">จัดการบัญชีผู้ใช้งาน (Users)</h1>
      <div class="search-bar">
        <input type="text" id="searchInput" class="admin-form-control" style="width:250px;"
          placeholder="ค้นหาด้วย Username..." onkeyup="if(event.key === 'Enter') fetchUsers()">
        <button class="btn-confirm" onclick="fetchUsers()">ค้นหา</button>
      </div>
    </header>

    <div class="admin-card">
      <table class="admin-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Username</th>
            <th>ชื่อ-นามสกุล</th>
            <th>Role</th>
            <th>Status</th>
            <th style="text-align:right;">การจัดการ (เฉพาะ admin@zoo.th)</th>
          </tr>
        </thead>
        <tbody id="userTableBody">
          <tr>
            <td colspan="6" style="text-align:center; padding: 2rem;">กำลังโหลดข้อมูล...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>

  <script src="../js/auth.js"></script>
  <script src="../js/admin.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initAdminLayout('users'); // เรียก Sidebar จาก admin.js
      fetchUsers();
    });

    async function fetchUsers() {
      const search = document.getElementById('searchInput').value;
      try {
        const res = await fetch('/api/auth/users?search=' + encodeURIComponent(search));
        const result = await res.json();

        if (result.success) {
          renderTable(result.data);
        }
      } catch (err) {
        console.error('Error fetching users:', err);
      }
    }

    function renderTable(users) {
      const tbody = document.getElementById('userTableBody');
      tbody.innerHTML = '';
      const currentUser = window.AUTH.getUser();

      if (users.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding: 2rem;">ไม่พบข้อมูลผู้ใช้งาน</td></tr>';
        return;
      }

      users.forEach(u => {
        const name = u.VisitorFName ? `${u.VisitorFName} ${u.VisitorLName}` :
          (u.AdminFirstName ? `${u.AdminFirstName} ${u.AdminLastName}` : '-');

        const isSuperAdmin = currentUser && currentUser.username === 'admin@zoo.th';
        const isSelf = currentUser && currentUser.username === u.Username;

        let actionBtn = '-';
        if (isSuperAdmin && !isSelf) {
          const currentRole = u.Role.toLowerCase();
          if (currentRole === 'admin') {
            actionBtn = `<button class="btn-action btn-demote" onclick="changeRole(${u.UserID}, 'user')">ลดขั้นเป็น User</button>`;
          } else {
            actionBtn = `<button class="btn-action btn-promote" onclick="changeRole(${u.UserID}, 'admin')">ตั้งเป็น Admin</button>`;
          }
        }

        const roleClass = u.Role.toLowerCase() === 'admin' ? 'role-admin' : 'role-user';

        tbody.innerHTML += `
          <tr>
            <td>${u.UserID}</td>
            <td>${u.Username}</td>
            <td>${name}</td>
            <td><span class="role-badge ${roleClass}">${u.Role.toUpperCase()}</span></td>
            <td>${u.AccountStatus}</td>
            <td style="text-align:right;">${actionBtn}</td>
          </tr>
        `;
      });
    }

    async function changeRole(userId, newRole) {
      const actionText = newRole === 'admin' ? 'ตั้งให้เป็น Admin' : 'ลดสถานะเป็น User';
      if (!confirm(`ยืนยันการ ${actionText} สำหรับผู้ใช้นี้ใช่หรือไม่?`)) return;

      const currentUser = window.AUTH.getUser();
      try {
        const res = await fetch('/api/auth/users/' + userId + '/role', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            role: newRole,
            requesterUsername: currentUser.username
          })
        });
        const result = await res.json();

        if (result.success) {
          alert(result.message);
          fetchUsers(); // รีโหลดตาราง
        } else {
          alert('ข้อผิดพลาด: ' + (result.message || 'ไม่สามารถเปลี่ยน Role ได้'));
        }
      } catch (err) {
        console.error(err);
        alert('ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้');
      }
    }
  </script>
</body>

</html>
