<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>รายละเอียดสัตว์ — Admin</title>
  <link rel="stylesheet" href="../css/admin.css">
  <style>
    .detail-container {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      min-height: 500px;
    }
    .detail-sidebar {
      width: 200px;
      border-right: 1px solid var(--admin-border);
      display: flex;
      flex-direction: column;
    }
    .detail-label-item {
      padding: 1.25rem 2rem;
      font-weight: 600;
      color: #333;
      text-align: right;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }
    .detail-content {
      flex: 1;
      position: relative;
    }
    .detail-value-item {
      padding: 1.25rem 3rem;
      color: #666;
      height: 64px;
      display: flex;
      align-items: center;
    }
    .value-box {
      font-size: 1rem;
      color: #444;
    }

    /* Edit Mode Styles */
    .edit-input {
      padding: 0.5rem 0.75rem;
      border: 1px solid #cbd5e0;
      border-radius: 6px;
      font-size: 0.95rem;
      width: 220px;
    }

    /* Header Icons */
    .header-actions {
      display: flex;
      gap: 1rem;
      align-items: center;
    }
    .icon-btn-circle {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: none;
      font-size: 1.1rem;
      transition: transform 0.2s;
    }
    .icon-btn-circle:hover { transform: scale(1.1); }
    .icon-btn-circle:disabled { background: #cbd5e0 !important; cursor: not-allowed; }
    .icon-btn-circle.cancel { background: #ff5f5f; color: white; }
    .icon-btn-circle.save { background: #4df04d; color: white; box-shadow: 0 4px 10px rgba(77, 240, 77, 0.4); }

    .edit-toggle-btn {
      background: white;
      border: 1px solid #cbd5e0;
      padding: 0.4rem 1.2rem;
      border-radius: 8px;
      font-size: 0.88rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    #edit-icons, #save-icons { display: none; }
    .page-view #edit-icons { display: flex; }
    .page-edit #save-icons { display: flex; }

    .page-view .edit-input, .page-view .edit-select { display: none; }
    .page-edit .value-box { display: none; }

    .delete-container {
      position: absolute;
      bottom: 2rem;
      right: 2rem;
    }
  </style>
</head>
<body class="admin-body page-view" id="main-body">

  <main class="admin-main">
    <header class="admin-header" style="display:flex; justify-content:space-between; align-items:center;">
      <div style="display:flex; align-items:center; gap:2rem;">
        <a href="#" id="back-btn" style="text-decoration:none; color:var(--admin-text); font-size:1.5rem;">❮</a>
        <h1 class="admin-title"><span id="title-name">...</span> <span id="title-id" style="color:var(--admin-muted); font-weight:400; font-size:1.5rem;">#</span></h1>
      </div>

      <div class="header-actions">
        <div id="edit-icons">
          <button class="edit-toggle-btn" onclick="setMode('edit')">แก้ไข 📝</button>
        </div>
        <div id="save-icons">
          <button class="icon-btn-circle cancel" onclick="setMode('view')">✕</button>
          <button class="icon-btn-circle save" id="save-btn" onclick="saveData()">✓</button>
        </div>
      </div>
    </header>

    <div class="detail-container">
      <div class="detail-sidebar">
        <div class="detail-label-item">ชื่อสายพันธุ์</div>
        <div class="detail-label-item">หมายเลขโซน</div>
        <div class="detail-label-item">หมายเลขกรง</div>
        <div class="detail-label-item">หมายเลขสัตว์</div>
        <div class="detail-label-item">ชื่อ</div>
        <div class="detail-label-item">เพศ</div>
        <div class="detail-label-item">วันเกิด</div>
        <div class="detail-label-item">วันที่เข้า</div>
        <div class="detail-label-item">หมายเลขพ่อพันธุ์</div>
        <div class="detail-label-item">หมายเลขแม่พันธุ์</div>
      </div>
      <div class="detail-content">
        <div class="detail-value-item"><span class="value-box" id="species-display">-</span></div>
        <div class="detail-value-item">
          <span class="value-box" id="zone-display">-</span>
          <input type="number" class="edit-input" id="zone-input">
        </div>
        <div class="detail-value-item">
          <span class="value-box" id="enclosure-display">-</span>
          <input type="number" class="edit-input" id="enclosure-input">
        </div>
        <div class="detail-value-item"><span class="value-box" id="id-display">-</span></div>
        <div class="detail-value-item">
          <span class="value-box" id="name-display">-</span>
          <input type="text" class="edit-input" id="name-input">
        </div>
        <div class="detail-value-item"><span class="value-box" id="gender-display">-</span></div>
        <div class="detail-value-item"><span class="value-box" id="birth-display">-</span></div>
        <div class="detail-value-item"><span class="value-box" id="arrival-display">-</span></div>
        <div class="detail-value-item"><span class="value-box" id="father-display">-</span></div>
        <div class="detail-value-item"><span class="value-box" id="mother-display">-</span></div>

        <div class="delete-container">
          <button class="btn-cancel" id="delete-btn" style="padding: 0.8rem 2.5rem; font-size:1rem;" onclick="deleteAnimal()">ลบข้อมูล</button>
        </div>
      </div>
    </div>
  </main>

  <script src="../js/auth.js"></script>
  <script src="../js/admin.js"></script>
  <script>
    initAdminLayout('animals');

    const urlParams = new URLSearchParams(window.location.search);
    const animalId = urlParams.get('id');
    let animalData = null;

    document.addEventListener('DOMContentLoaded', () => {
      if (!animalId) {
        alert('ไม่พบหมายเลขสัตว์');
        window.location.href = 'zones.html';
        return;
      }
      fetchAnimalDetail();
    });

    async function fetchAnimalDetail() {
      try {
        const res = await fetch(`/api/animals/${animalId}`);
        const result = await res.json();

        if (result.success) {
          animalData = result.data;
          renderData();
        } else {
          console.error('Fetch error:', result.message);
          alert('ไม่พบข้อมูลสัตว์ตัวนี้ในระบบ');
        }
      } catch (err) {
        console.error(err);
        alert('เกิดข้อผิดพลาดในการโหลดข้อมูลจากเซิร์ฟเวอร์');
      }
    }

    function renderData() {
      const a = animalData;
      if (!a) return;
      
      // Header
      document.getElementById('title-name').textContent = a.AnimalName;
      document.getElementById('title-id').textContent = `#${a.AnimalID}`;
      document.getElementById('back-btn').href = `species-detail.html?speciesId=${a.SpeciesID}&cageId=${a.EnclosureID}&zoneId=${a.ZoneID}`;

      // Values
      document.getElementById('species-display').textContent = a.SpeciesName;
      document.getElementById('zone-display').textContent = `#${a.ZoneID} ${a.ZoneName}`;
      document.getElementById('enclosure-display').textContent = `#${a.EnclosureID}`;
      document.getElementById('id-display').textContent = `#${a.AnimalID}`;
      document.getElementById('name-display').textContent = a.AnimalName;
      document.getElementById('gender-display').textContent = a.Gender === 'Male' ? 'ตัวผู้ (Male)' : 'ตัวเมีย (Female)';
      document.getElementById('birth-display').textContent = a.BirthDate || '-';
      document.getElementById('arrival-display').textContent = a.ArrivalDate || '-';
      document.getElementById('father-display').textContent = a.FatherID ? `#${a.FatherID}` : '-';
      document.getElementById('mother-display').textContent = a.MotherID ? `#${a.MotherID}` : '-';

      // Inputs
      document.getElementById('name-input').value = a.AnimalName;
      document.getElementById('zone-input').value = a.ZoneID;
      document.getElementById('enclosure-input').value = a.EnclosureID;
    }

    function setMode(mode) {
      const body = document.getElementById('main-body');
      if (mode === 'edit') {
        body.classList.remove('page-view');
        body.classList.add('page-edit');
      } else {
        body.classList.remove('page-edit');
        body.classList.add('page-view');
      }
    }

    async function saveData() {
      const nameInput = document.getElementById('name-input');
      const zoneInput = document.getElementById('zone-input');
      const enclosureInput = document.getElementById('enclosure-input');
      const saveBtn = document.getElementById('save-btn');

      const newName = nameInput.value.trim();
      const newZoneId = parseInt(zoneInput.value);
      const newEnclosureId = parseInt(enclosureInput.value);

      if (!newName) {
        alert('กรุณากรอกชื่อสัตว์');
        return;
      }
      if (!newZoneId || !newEnclosureId) {
        alert('กรุณากรอกหมายเลขโซนและหมายเลขกรง');
        return;
      }

      try {
        saveBtn.disabled = true;
        const res = await fetch(`/api/animals/${animalId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: newName, zoneId: newZoneId, enclosureId: newEnclosureId })
        });
        const result = await res.json();

        if (result.success) {
          alert('บันทึกข้อมูลสำเร็จ!');
          await fetchAnimalDetail();
          setMode('view');
        } else {
          alert('บันทึกข้อมูลไม่สำเร็จ: ' + (result.message || 'Unknown error'));
        }
      } catch (err) {
        console.error(err);
        alert('เกิดข้อผิดพลาดในการเชื่อมต่อกับเซิร์ฟเวอร์');
      } finally {
        saveBtn.disabled = false;
      }
    }

    async function deleteAnimal() {
      if (confirm('คุณแน่ใจว่าต้องการลบข้อมูลสัตว์ตัวนี้?')) {
        const deleteBtn = document.getElementById('delete-btn');
        try {
          deleteBtn.disabled = true;
          const res = await fetch(`/api/animals/${animalId}`, { method: 'DELETE' });
          const result = await res.json();
          if (result.success) {
            alert('ลบข้อมูลสำเร็จ');
            window.location.href = document.getElementById('back-btn').href;
          } else {
            alert('ลบข้อมูลไม่สำเร็จ');
          }
        } catch (err) {
          console.error(err);
          alert('เกิดข้อผิดพลาดในการลบข้อมูล');
        } finally {
          deleteBtn.disabled = false;
        }
      }
    }
  </script>
</body>
</html>
