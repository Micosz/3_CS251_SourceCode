<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Zoo Web App</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-page">

  <div class="auth-bg">
    <img src="images/ZOOLoginBG.png" class="soul-ghost" alt="">
    <img src="images/ZOOLoginBG.png" class="soul-main" alt="">
  </div>

  <div class="auth-wrapper">
    <div class="auth-card">
      <h1 class="auth-title">Login</h1>

      <div class="auth-error" id="login-error"></div>

      <form class="auth-form" id="login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input
            type="text"
            class="form-control"
            id="username"
            placeholder="Enter username"
            autocomplete="username"
            required
          >
          <div class="form-error" id="username-error">Please enter your username.</div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-group">
            <input
              type="password"
              class="form-control"
              id="password"
              placeholder="Password"
              autocomplete="current-password"
              required
            >
            <span class="input-icon-right" id="toggle-password">Show</span>
          </div>
          <div class="form-error" id="password-error">Please enter your password.</div>
        </div>

        <button type="submit" class="btn btn-primary" id="login-btn">Sign in</button>
      </form>

      <p class="auth-register-link">
        No account?
        <a href="register.html">Register</a>
      </p>
    </div>
  </div>

  <script src="js/layout.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/auth.js"></script>

  <script>
    /* Fix: all login code is guarded so one missing element cannot break the page. */
    (function () {
      const form = document.getElementById('login-form');
      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');
      const button = document.getElementById('login-btn');
      const loginError = document.getElementById('login-error');
      const toggle = document.getElementById('toggle-password');

      if (AUTH.getUser()) {
        window.location.href = 'index.html';
        return;
      }

      if (toggle && passwordInput) {
        toggle.addEventListener('click', function () {
          passwordInput.type = passwordInput.type === 'password' ? 'text' : 'password';
          toggle.textContent = passwordInput.type === 'password' ? 'Show' : 'Hide';
        });
      }

      if (!form) return;

      form.addEventListener('submit', async function (event) {
        event.preventDefault();
        clearErrors();

        const username = usernameInput ? usernameInput.value.trim() : '';
        const password = passwordInput ? passwordInput.value : '';
        let valid = true;

        if (!username) {
          showFieldError('username-error');
          valid = false;
        }

        if (!password) {
          showFieldError('password-error');
          valid = false;
        }

        if (!valid) return;

        button.disabled = true;
        button.textContent = 'Signing in...';

        const result = await AUTH.login(username, password);

        if (result.success) {
          /* Fix: successful login always redirects to index.html. */
          window.location.href = 'index.html';
          return;
        }

        showAuthError(result.message || 'Login failed.');
        button.disabled = false;
        button.textContent = 'Sign in';
      });

      function showFieldError(id) {
        const el = document.getElementById(id);
        if (el) el.classList.add('show');
      }

      function clearErrors() {
        document.querySelectorAll('.form-error').forEach(function (el) {
          el.classList.remove('show');
        });

        if (loginError) {
          loginError.textContent = '';
          loginError.classList.remove('show');
        }
      }

      function showAuthError(message) {
        if (!loginError) return;
        loginError.textContent = message;
        loginError.classList.add('show');
      }
    })();
  </script>
</body>
</html>
