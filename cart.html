<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ตะกร้าสินค้า — สวนสัตว์เขาไม่รัก</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/user.css">
</head>
<body>

  <main class="cart-page">
    <div class="container">

      <div class="page-breadcrumb">
        <a href="index.html">หน้าหลัก</a> <span>›</span>
        <a href="tickets.html">ซื้อบัตร</a> <span>›</span>
        <span>ตะกร้าสินค้า</span>
      </div>

      <div class="section-heading" style="margin-bottom:2rem;">
        <h2>ตะกร้าสินค้า</h2>
      </div>

      <!-- Empty state -->
      <div class="cart-empty-state" id="cart-empty" style="display:none;">
        <div class="empty-icon">🛒</div>
        <h3>ตะกร้าว่างเปล่า</h3>
        <p>คุณยังไม่ได้เพิ่มบัตรเข้าชมลงในตะกร้า</p>
        <a href="tickets.html" class="btn btn-primary btn-lg">🎟️ ไปซื้อบัตร</a>
      </div>

      <!-- Cart content -->
      <div id="cart-content" class="cart-layout">

        <!-- Left: Cart items -->
        <div>
          <div style="background:white; border-radius:var(--radius-lg); box-shadow:var(--shadow); border:1px solid var(--gray-100);">
            <div style="padding:1.25rem 1.5rem; border-bottom:1px solid var(--gray-200);">
              <h4>รายการบัตร</h4>
            </div>
            <div style="padding:0 1.5rem;" id="cart-items">
              <!-- Injected by JS -->
            </div>
          </div>

          <!-- Promo code -->
          <div class="promo-section" style="margin-top:1.25rem;">
            <div class="promo-label">🏷️ รหัสส่วนลด</div>
            <div class="promo-input-row">
              <input
                type="text"
                class="form-control"
                id="promo-input"
                placeholder="กรอกรหัสส่วนลด (เช่น 3SALE)"
                maxlength="20"
              >
              <button class="btn btn-secondary" id="promo-btn" onclick="applyPromoCode()">ใช้โค้ด</button>
            </div>
            <div id="promo-msg" style="margin-top:0.5rem; font-size:0.85rem; display:none;"></div>
            <div class="promo-applied" id="promo-applied" style="display:none;">
              <span>✅</span>
              <span id="promo-applied-text"></span>
              <button onclick="removePromoCode()" style="color:var(--danger); font-size:1rem; margin-left:auto;" title="ลบส่วนลด">✕</button>
            </div>
          </div>
        </div>

        <!-- Right: Summary -->
        <div class="cart-summary">
          <div class="cart-summary-title">สรุปรายการ</div>
          <div id="summary-rows">
            <!-- Injected by JS -->
          </div>
          <div class="divider"></div>
          <div class="summary-row total">
            <span>ยอดรวม</span>
            <span id="total-amount">฿0</span>
          </div>
          <a href="payment.html" class="btn btn-primary btn-block btn-lg" style="margin-top:1.25rem;" id="checkout-btn">
            ชำระเงิน →
          </a>
          <a href="tickets.html" class="btn btn-ghost btn-block" style="margin-top:0.5rem; font-size:0.85rem;">
            ← เพิ่มบัตรเพิ่มเติม
          </a>
        </div>

      </div>

    </div>
  </main>

 <script src="js/layout.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/auth.js"></script>
 <script>
    initNavbar('');
    initFooter();
    initToaster();

    // ================= HELPER =================
    function getDisplayName(item) {
      return item.nameTH || item.type || 'ไม่ระบุชื่อ';
    }

    function getIcon(item) {
      if (item.icon) return item.icon;
      if (item.image) {
        return `<img src="${item.image}" style="width:40px;height:40px;object-fit:contain;" onerror="this.src='images/default.png'">`;
      }
      return '🎟️';
    }

    function formatPrice(price) {
      return `฿${Number(price).toLocaleString()}`;
    }

    // ================= RENDER =================
    function renderCart() {
      const items = CART.getItems();
      const isEmpty = CART.isEmpty();

      document.getElementById('cart-empty').style.display   = isEmpty ? 'block' : 'none';
      document.getElementById('cart-content').style.display = isEmpty ? 'none'  : 'grid';
      if (isEmpty) return;

      const container = document.getElementById('cart-items');

      container.innerHTML = items.map(item => `
        <div class="cart-item" data-id="${item.id}">
          
          <div class="cart-item-icon">
            ${getIcon(item)}
          </div>

          <div class="cart-item-info">
            <div class="cart-item-name">
              ${getDisplayName(item)}
            </div>
            <div class="cart-item-unit">
              ${item.isFree ? 'ฟรี' : `${formatPrice(item.price)} × ${item.qty}`}
            </div>
          </div>

          <div class="cart-item-qty">
            <button class="qty-btn" 
              onclick="updateItemQty('${String(item.id).replace(/'/g, "\\'")}', ${item.qty - 1})" 
              ${item.qty <= 1 ? 'disabled' : ''}>−</button>

            <span class="qty-display">${item.qty}</span>

            <button class="qty-btn" 
              onclick="updateItemQty('${String(item.id).replace(/'/g, "\\'")}', ${item.qty + 1})">+</button>
          </div>

          <div class="cart-item-subtotal">
            ${item.isFree ? 'ฟรี' : formatPrice(item.price * item.qty)}
          </div>

          <button class="cart-remove-btn" 
            onclick="removeItem('${String(item.id).replace(/'/g, "\\'")}')" 
            title="ลบออก">🗑️</button>
        </div>
      `).join('');

      // ================= SUMMARY =================
      const summaryEl = document.getElementById('summary-rows');
      const promo = CART.getPromo();
      const discount = CART.getDiscount();

      let summaryHTML = items.map(i => `
        <div class="summary-row">
          <span>${i.type || getDisplayName(i)} ×${i.qty}</span>
          <span>${i.isFree ? 'ฟรี' : formatPrice(i.price * i.qty)}</span>
        </div>
      `).join('');

      if (discount > 0) {
        summaryHTML += `
          <div class="summary-row discount">
            <span style="font-size:0.82rem;">ส่วนลด: ${promo.code}</span>
            <span>−${formatPrice(discount)}</span>
          </div>
        `;
      }

      summaryEl.innerHTML = summaryHTML;

      document.getElementById('total-amount').textContent =
        formatPrice(CART.getTotal());

      // ================= PROMO =================
      if (promo) {
        document.getElementById('promo-applied').style.display = 'flex';
        document.getElementById('promo-applied-text').textContent =
          `${promo.code}: ลด ${formatPrice(promo.discountAmount)}`;
        document.getElementById('promo-input').value = promo.code;
        document.getElementById('promo-msg').style.display = 'none';
      } else {
        document.getElementById('promo-applied').style.display = 'none';
        document.getElementById('promo-input').value = '';
      }
    }

    // ================= UPDATE QTY =================
    function updateItemQty(id, newQty) {
      id = String(id); // 🔥 FIX สำคัญมาก

      if (newQty <= 0) {
        CART.removeItem(id);
      } else {
        CART.setQty(id, newQty);
      }

      renderCart();
    }

    // ================= REMOVE =================
    function removeItem(id) {
      id = String(id); // 🔥 FIX สำคัญ

      CART.removeItem(id);
      showToast('ลบรายการออกจากตะกร้าแล้ว', 'info');
      renderCart();
    }

    // ================= PROMO =================
    async function applyPromoCode() {
      const code = document.getElementById('promo-input').value.trim();
      if (!code) return;

      const msgEl = document.getElementById('promo-msg');
      const btn = document.getElementById('promo-btn');

      if (btn) {
        btn.disabled = true;
        btn.textContent = 'กำลังตรวจ...';
      }

      // Fix: validate the code against the Promotion table through the API.
      const result = await CART.applyPromo(code);

      msgEl.style.display = 'block';

      if (result.valid) {
        msgEl.style.color = 'var(--primary)';
        msgEl.textContent = `✅ ${result.message} (ลด ${formatPrice(result.discountAmount)})`;
        showToast('ใช้รหัสส่วนลดสำเร็จ!', 'success');
      } else {
        msgEl.style.color = 'var(--danger)';
        msgEl.textContent = `❌ ${result.message}`;
      }

      if (btn) {
        btn.disabled = false;
        btn.textContent = 'ใช้โค้ด';
      }

      renderCart();
    }

    function removePromoCode() {
      CART.removePromo();
      document.getElementById('promo-msg').style.display = 'none';
      showToast('ลบรหัสส่วนลดแล้ว', 'info');
      renderCart();
    }

    // ================= ENTER KEY =================
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('promo-input')?.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') applyPromoCode();
      });
    });

    // Re-render when CART changes from another shared helper.
    window.addEventListener('cart:changed', renderCart);

    // ================= START =================
    renderCart();
</script>
</body>
</html>
